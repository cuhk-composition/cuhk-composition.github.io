<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantonese Choral Works Catalog</title>
    <style>
        :root {
            --primary-color: #d99b26;
            --text-dark: #222;
            --text-muted: #555;
            --bg-light: #f9f9f9;
            --border-color: #eee;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-dark);
            background-color: #fff;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header Style matching the attached image */
        h1.page-title {
            font-size: 24px;
            font-weight: bold;
            position: relative;
            padding-bottom: 8px;
            margin-bottom: 24px;
            display: inline-block;
        }

        h1.page-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 3px;
            background-color: var(--primary-color);
        }

        /* Search Box Wrapper */
        .search-container {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(217, 155, 38, 0.2);
        }

        /* Cards List container */
        .cards-list {
            display: flex;
            flex-direction: column;
        }

        /* Render Card Layout matching the attached screenshot */
        .render-card {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            padding: 24px 0;
            gap: 24px;
        }

        /* Left section: Date / Year metadata block */
        .card-left {
            min-width: 120px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 4px;
        }

        .card-year-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .card-year-value {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        .card-duration {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Right section: Main content fields */
        .card-right {
            flex-grow: 1;
        }

        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: #1a1a1a;
        }

        .card-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .meta-item a {
            color: #0066cc;
            text-decoration: none;
        }

        .meta-item a:hover {
            text-decoration: underline;
        }

        .card-description {
            font-size: 14px;
            line-height: 1.5;
            color: #444;
            margin-bottom: 16px;
        }

        /* Badge/Tags Area */
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
            background-color: var(--bg-light);
            color: var(--text-muted);
        }

        .tag-badge.accent {
            background-color: #fff9e6;
            color: #b37d14;
        }

        /* Utilities */
        .no-results {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Icon Placeholders matching UI icons */
        .icon-composer::before { content: "👤 "; }
        .icon-link::before { content: "🔗 "; }
        .icon-text::before { content: "📝 "; }

    </style>
</head>
<body>

    </div>

    <div id="cardsContainer" class="cards-list"></div>

        }

    // Function to render layout UI cards interface elements HTML structure
    function renderCards(data) {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';

        if(data.length === 0) {
            document.getElementById('noResults').style.display = 'block';
            return;
        } else {
            document.getElementById('noResults').style.display = 'none';
        }

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'render-card';
            
            // Format dynamic descriptions block
            let descriptionText = `A choral rendering setting of "${item.textType}" lyrics written by ${item.textAuthorC || 'the composer'}. `;
            if(item.remarks) {
                descriptionText += `${item.remarks}.`;
            }

            // Build dynamic link markup safely if link data exists
            const linkMarkup = item.mediaLink 
                ? `<span class="meta-item icon-link"><a href="${item.mediaLink}" target="_blank">Watch / Listen</a></span>` 
                : '';

            card.innerHTML = `
                <div class="card-left">
                    <span class="card-year-label">YEAR</span>
                    <span class="card-year-value">${item.year}</span>
                    <span class="card-duration">⏱ ${item.duration || 'N/A'}</span>
                </div>
                <div class="card-right">
                    <h2 class="card-title">${item.titleC} <span style="font-weight:normal; font-size:16px; color:var(--text-muted); font-style:italic;">${item.titleE ? '- ' + item.titleE : ''}</span></h2>
                    
                    <div class="card-meta-row">
                        <span class="meta-item icon-composer">${item.composerC} (${item.composerE})</span>
                        <span class="meta-item icon-text">Text: ${item.textAuthorC || 'N/A'}</span>
                        ${linkMarkup}
                    </div>

                    <div class="card-description">
                        ${descriptionText}
                    </div>

                    <div class="card-tags">
                        <span class="tag-badge accent">${item.voiceType}</span>
                        <span class="tag-badge">${item.instrument}</span>
                        <span class="tag-badge">${item.textType.split(',')[0]}</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Dynamic keyup/input handler filter mechanism algorithm logic
    document.getElementById('keywordSearch').addEventListener('input', function(e) {
        const query = e.target.value.toLowerCase().trim();
        
        const filtered = catalogData.filter(item => {
            return (
                item.titleC.toLowerCase().includes(query) ||
                (item.titleE && item.titleE.toLowerCase().includes(query)) ||
                item.composerC.toLowerCase().includes(query) ||
                item.composerE.toLowerCase().includes(query) ||
                (item.textAuthorC && item.textAuthorC.toLowerCase().includes(query)) ||
                item.voiceType.toLowerCase().includes(query) ||
                item.instrument.toLowerCase().includes(query) ||
                item.textType.toLowerCase().includes(query)
            );
        });
        
        renderCards(filtered);
    });

    // Initial render call invocation hook execution lifecycle logic stage
    renderCards(catalogData);
</script>

</html>
