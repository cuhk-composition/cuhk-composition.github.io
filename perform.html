<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concerts Schedule Catalog</title>
    <style>
        :root {
            --accent-orange: #d99b26;
            --text-main: #222222;
            --text-secondary: #555555;
            --border-gray: #e2e2e2;
            --tag-yellow-bg: #fff9e6;
            --tag-yellow-text: #b37d14;
            --tag-gray-bg: #ffffff;
            --tag-gray-border: #cccccc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            background-color: #ffffff;
            margin: 0;
            padding: 30px 20px;
        }

        .wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        h1.section-title {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 24px 0;
            display: inline-block;
            position: relative;
            padding-bottom: 6px;
        }

        h1.section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 3px;
            background-color: var(--accent-orange);
        }

        .search-block {
            margin-bottom: 24px;
        }

        .search-bar {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar:focus {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 2px rgba(217, 155, 38, 0.15);
        }

        .concerts-list {
            display: flex;
            flex-direction: column;
        }

        .concert-card {
            display: flex;
            border-bottom: 1px solid var(--border-gray);
            padding: 24px 0;
            gap: 24px;
        }

        .card-left-date {
            min-width: 110px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 4px;
        }

        .date-year {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .date-day {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 2px;
            white-space: nowrap;
        }

        .date-time {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .card-right-content {
            flex-grow: 1;
        }

        .concert-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 10px 0;
            line-height: 1.3;
            color: #111111;
        }

        .concert-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .meta-node {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .meta-node.location::before { content: "📍"; font-size: 12px; }
        .meta-node.hall::before { content: "🔗"; font-size: 12px; }
        .meta-node a { color: var(--text-secondary); text-decoration: none; }
        .meta-node a:hover { text-decoration: underline; color: #0066cc; }

        .concert-desc {
            font-size: 14px;
            line-height: 1.5;
            color: #444444;
            margin-bottom: 14px;
        }

        .concert-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .tag.yellow-badge {
            background-color: var(--tag-yellow-bg);
            color: var(--tag-yellow-text);
        }

        .tag.gray-badge {
            background-color: transparent;
            border: 1px solid var(--tag-gray-border);
            color: var(--text-secondary);
            padding: 3px 9px;
        }

        .status-message {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1 class="section-title">Concerts List</h1>

    <div class="search-block">
        <input type="text" id="concertSearch" class="search-bar" placeholder="Loading dynamic feed..." disabled>
    </div>

    <div id="concertsContainer" class="concerts-list"></div>
    <div id="statusAlert" class="status-message">Loading live schedule data from Google Sheets...</div>
</div>
