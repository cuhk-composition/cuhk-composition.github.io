<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concerts Schedule Catalog</title>
    <style>
        :root {
            --accent-orange: #d99b26;
            --text-main: #222222;
            --text-secondary: #555555;
            --border-gray: #e2e2e2;
            --tag-yellow-bg: #fff9e6;
            --tag-yellow-text: #b37d14;
            --tag-gray-bg: #ffffff;
            --tag-gray-border: #cccccc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            background-color: #ffffff;
            margin: 0;
            padding: 30px 20px;
        }

        .wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Title layout exactly matching Screenshot 2026-06-02 at 12.39.01 AM.jpg */
        h1.section-title {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 24px 0;
            display: inline-block;
            position: relative;
            padding-bottom: 6px;
        }

        h1.section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 3px;
            background-color: var(--accent-orange);
        }

        /* Search input bar wrapper styles */
        .search-block {
            margin-bottom: 24px;
        }

        .search-bar {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar:focus {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 2px rgba(217, 155, 38, 0.15);
        }

        /* Cards List container structure */
        .concerts-list {
            display: flex;
            flex-direction: column;
        }

        /* Layout structure mirroring Screenshot 2026-06-02 at 12.39.01 AM.jpg */
        .concert-card {
            display: flex;
            border-bottom: 1px solid var(--border-gray);
            padding: 24px 0;
            gap: 24px;
        }

        /* Left-side Date block layout */
        .card-left-date {
            min-width: 110px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 4px;
        }

        .date-year {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .date-day {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 2px;
            white-space: nowrap;
        }

        .date-time {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Right-side dynamic parameters container */
        .card-right-content {
            flex-grow: 1;
        }

        .concert-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 10px 0;
            line-height: 1.3;
            color: #111111;
        }

        .concert-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .meta-node {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .meta-node.location::before { content: "📍"; font-size: 12px; }
        .meta-node.hall::before { content: "🔗"; font-size: 12px; }
        .meta-node a { color: var(--text-secondary); text-decoration: none; }
        .meta-node a:hover { text-decoration: underline; color: #0066cc; }

        .concert-desc {
            font-size: 14px;
            line-height: 1.5;
            color: #444444;
            margin-bottom: 14px;
        }

        /* Badge/Tags configuration styles */
        .concert-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .tag.yellow-badge {
            background-color: var(--tag-yellow-bg);
            color: var(--tag-yellow-text);
        }

        .tag.gray-badge {
            background-color: transparent;
            border: 1px solid var(--tag-gray-border);
            color: var(--text-secondary);
            padding: 3px 9px;
        }

        /* Dynamic Feedback system element states */
        .status-message {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Header title component from template screenshot -->
    <h1 class="section-title">Concerts List</h1>

    <!-- Real-time keyword filter element panel block -->
    <div class="search-block">
        <input type="text" id="concertSearch" class="search-bar" placeholder="Search live by concert name, instrumentation, performer, city, or venue..." disabled>
    </div>

    <!-- Live layout insertion target node -->
    <div id="concertsContainer" class="concerts-list"></div>
    <div id="statusAlert" class="status-message">Loading live schedule data from Google Sheets...</div>
</div>

<script>
    // Live Sheets CSV API export path URL configuration using your specific GID tab
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1ewOnbKddBpx4YFSQpfvhOvmJCznhGzdcS2DyMFp7d08/export?format=csv&gid=1551264105";

    let globalConcertsDataset = [];

    // Simple CSV parser implementation handling text quotes and commas safely
    function parseCSV(text) {
        let lines = [];
        let row = [""];
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            let next = text[i+1];
            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (c === ',' && !inQuotes) {
                row.push('');
            } else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row);
                row = [''];
            } else {
                row[row.length - 1] += c;
            }
        }
        if (row.length > 1 || row[0] !== '') { lines.push(row); }
        return lines;
    }

    // Dynamic asynchronous spreadsheet download engine
    async function loadLiveSpreadsheetData() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            if (!response.ok) throw new Error("Failed to download sheet feed.");
            
            const rawCsvText = await response.text();
            const csvRows = parseCSV(rawCsvText);

            if (csvRows.length < 2) {
                document.getElementById('statusAlert').innerText = "Spreadsheet tab appears to be empty.";
                return;
            }

            // Map spreadsheet headers cleanly into an array of JSON objects
            // Headers format: Date, Cantonese, Premiere/Performance, Title, Instrumentation, Performer, Venue, City, Country, Link, Time, Occasion/Presenter
            const headers = csvRows[0].map(h => h.trim());
            
            globalConcertsDataset = csvRows.slice(1).map(row => {
                let obj = {};
                headers.forEach((header, index) => {
                    obj[header] = row[index] ? row[index].trim() : '';
                });
                return obj;
            }).filter(item => item.Date && item.Title); // Only parse rows containing active concert markers

            // Initialization clean step execution hook
            document.getElementById('concertSearch').disabled = false;
            document.getElementById('concertSearch').placeholder = "Type keywords here to filter schedule contents...";
            
            displayConcerts(globalConcertsDataset);

        } catch (error) {
            console.error(error);
            document.getElementById('statusAlert').innerText = "Error syncing with live data source: " + error.message;
        }
    }

    // Function to render layout data structures mirroring Screenshot 2026-06-02 at 12.39.01 AM.jpg
    function displayConcerts(itemsList) {
        const listContainer = document.getElementById('concertsContainer');
        const statusAlert = document.getElementById('statusAlert');
        
        listContainer.innerHTML = '';

        if (itemsList.length === 0) {
            statusAlert.style.display = 'block';
            statusAlert.innerText = "No upcoming concert items found matching that term.";
            return;
        } else {
            statusAlert.style.display = 'none';
        }

        itemsList.forEach(item => {
            const cardNode = document.createElement('div');
            cardNode.className = 'concert-card';

            // Split and format the date values dynamically
            // Date format pattern from sheet: YYYY-MM-DD[cite: 1]
            const dateParts = item.Date.split('-');[cite: 1]
            const year = dateParts[0] || '2026';[cite: 1]
            const monthDayStr = (dateParts[1] && dateParts[2]) ? `${dateParts[1]}/${dateParts[2]}` : item.Date;[cite: 1]
            const timeDisplay = item.Time || 'TBA';[cite: 1]

            // Generate conditional interactive text body segments from parsed row parameters[cite: 1]
            const descriptionContent = `Concert presentation features a performance of <strong>"${item.Title}"</strong> arranged ${item.Instrumentation || ''}. Brought to stage by ${item.Performer || 'various artists'} located at ${item.Venue || 'the designated auditorium'}. ${item['Occasion/Presenter'] ? 'Presented on the occasion of: ' + item['Occasion/Presenter'] + '.' : ''}`;[cite: 1]

            // Dynamic setup for badge tags block array matching template types
            let badgesArr = [];
            if (item['Premiere/Performance']) badgesArr.push({ text: item['Premiere/Performance'], type: 'yellow' });[cite: 1]
            if (item.Instrumentation) badgesArr.push({ text: item.Instrumentation.replace(/^for\s+/i, ''), type: 'yellow' });[cite: 1]
            if (item.Cantonese === 'Y' || item.粵 === 'Y') badgesArr.push({ text: 'Cantonese Repertoire', type: 'gray' });[cite: 1]

            const tagsHTML = badgesArr.map(badge => {
                const modifierClass = badge.type === "gray" ? "gray-badge" : "yellow-badge";
                return `<span class="tag ${modifierClass}">${badge.text}</span>`;
            }).join('');

            // Build structural location meta line dynamically[cite: 1]
            const venueElement = item.Link 
                ? `<a href="${item.Link}" target="_blank">${item.Venue || 'View Venue Link'}</a>`[cite: 1]
                : (item.Venue || 'TBA');[cite: 1]

            cardNode.innerHTML = `
                <div class="card-left-date">
                    <span class="date-year">${year}</span>
                    <span class="date-day">${monthDayStr}</span>
                    <span class="date-time">${timeDisplay}</span>
                </div>
                <div class="card-right-content">
                    <h2 class="concert-title">${item.Title}</h2>
                    
                    <div class="concert-meta">
                        <span class="meta-node location">${item.City || 'Osaka'}, ${item.Country || 'Japan'}</span>
                        <span class="meta-node hall">${venueElement}</span>
                    </div>

                    <div class="concert-desc">
                        ${descriptionContent}
                    </div>

                    <div class="concert-tags">
                        ${tagsHTML}
                    </div>
                </div>
            `;
            listContainer.appendChild(cardNode);
        });
    }

    // Real-time input query change handling filter listener setup
    document.getElementById('concertSearch').addEventListener('input', function(event) {
        const filterToken = event.target.value.toLowerCase().trim();
        
        const matchingConcerts = globalConcertsDataset.filter(concert => {
            return (
                (concert.Title && concert.Title.toLowerCase().includes(filterToken)) ||
                (concert.Venue && concert.Venue.toLowerCase().includes(filterToken)) ||
                (concert.Performer && concert.Performer.toLowerCase().includes(filterToken)) ||
                (concert.Instrumentation && concert.Instrumentation.toLowerCase().includes(filterToken)) ||
                (concert.City && concert.City.toLowerCase().includes(filterToken))
            );
        });
        
        displayConcerts(matchingConcerts);
    });

    // Run basic initialization render on body lifecycle load
    window.addEventListener('DOMContentLoaded', loadLiveSpreadsheetData);
</script>

</body>
</html>
