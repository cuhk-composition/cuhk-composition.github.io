<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concerts Schedule Catalog</title>
    <style>
        :root {
            --accent-orange: #d99b26;
            --text-main: #222222;
            --text-secondary: #555555;
            --border-gray: #e2e2e2;
            --tag-yellow-bg: #fff9e6;
            --tag-yellow-text: #b37d14;
            --tag-gray-bg: #ffffff;
            --tag-gray-border: #cccccc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            background-color: #ffffff;
            margin: 0;
            padding: 30px 20px;
        }

        .wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        h1.section-title {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 24px 0;
            display: inline-block;
            position: relative;
            padding-bottom: 6px;
        }

        h1.section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 3px;
            background-color: var(--accent-orange);
        }

        .search-block {
            margin-bottom: 24px;
        }

        .search-bar {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar:focus {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 2px rgba(217, 155, 38, 0.15);
        }

        .concerts-list {
            display: flex;
            flex-direction: column;
        }

        .concert-card {
            display: flex;
            border-bottom: 1px solid var(--border-gray);
            padding: 24px 0;
            gap: 24px;
        }

        .card-left-date {
            min-width: 110px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 4px;
        }

        .date-year {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .date-day {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 2px;
            white-space: nowrap;
        }

        .date-time {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .card-right-content {
            flex-grow: 1;
        }

        .concert-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 10px 0;
            line-height: 1.3;
            color: #111111;
        }

        .concert-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .meta-node {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .meta-node.location::before { content: "📍"; font-size: 12px; }
        .meta-node.hall::before { content: "🔗"; font-size: 12px; }
        .meta-node a { color: var(--text-secondary); text-decoration: none; }
        .meta-node a:hover { text-decoration: underline; color: #0066cc; }

        .concert-desc {
            font-size: 14px;
            line-height: 1.5;
            color: #444444;
            margin-bottom: 14px;
        }

        .concert-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .tag.yellow-badge {
            background-color: var(--tag-yellow-bg);
            color: var(--tag-yellow-text);
        }

        .tag.gray-badge {
            background-color: transparent;
            border: 1px solid var(--tag-gray-border);
            color: var(--text-secondary);
            padding: 3px 9px;
        }

        .status-message {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1 class="section-title">Concerts List</h1>

    <div class="search-block">
        <input type="text" id="concertSearch" class="search-bar" placeholder="Loading dynamic feed..." disabled>
    </div>

    <div id="concertsContainer" class="concerts-list"></div>
    <div id="statusAlert" class="status-message">Loading live schedule data from Google Sheets...</div>
</div>

<script>
    let globalConcertsDataset = [];

    // 1. Define the Global Callback Function that Google Sheets will reply to
    window.handleGoogleSheetResponse = function(dataObject) {
        try {
            const rows = dataObject.table.rows;
            
            // Map the custom columns cleanly
            const expectedHeaders = [
                'Date', 'Cantonese', 'Premiere/Performance', 'Title', 'Instrumentation', 
                'Performer', 'Venue', 'City', 'Country', 'Link', 'Time', 'Occasion/Presenter'
            ];

            globalConcertsDataset = rows.map(row => {
                let item = {};
                expectedHeaders.forEach((header, index) => {
                    const cellValue = row.c[index];
                    if (cellValue && cellValue.f) {
                        item[header] = cellValue.f.trim();
                    } else if (cellValue && cellValue.v !== null && cellValue.v !== undefined) {
                        item[header] = String(cellValue.v).trim();
                    } else {
                        item[header] = '';
                    }
                });
                return item;
            }).filter(item => item.Date && item.Title); // Filter out empty rows

            // Activate Search Input
            document.getElementById('concertSearch').disabled = false;
            document.getElementById('concertSearch').placeholder = "Type keywords here to filter schedule...";
            
            displayConcerts(globalConcertsDataset);

        } catch (error) {
            console.error(error);
            document.getElementById('statusAlert').innerText = "Data parsing error. Please check your columns layout.";
        }
    };

    // 2. Inject Data Request dynamically as a script tag to prevent browser CORS blockages
    function initLiveFetch() {
        const spreadsheetId = '1ewOnbKddBpx4YFSQpfvhOvmJCznhGzdcS2DyMFp7d08';
        const gid = '1551264105';
        
        // This endpoint bypasses CORS and triggers handleGoogleSheetResponse directly
        const jsonpUrl = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=responseHandler:handleGoogleSheetResponse&gid=${gid}`;
        
        const scriptElement = document.createElement('script');
        scriptElement.src = jsonpUrl;
        scriptElement.onerror = function() {
            document.getElementById('statusAlert').innerText = "Failed to communicate with Google Sheets. Confirm 'Anyone with the link can view' is set.";
        };
        document.body.appendChild(scriptElement);
    }

    // Render Cards UI
    function displayConcerts(itemsList) {
        const listContainer = document.getElementById('concertsContainer');
        const statusAlert = document.getElementById('statusAlert');
        listContainer.innerHTML = '';

        if (itemsList.length === 0) {
            statusAlert.style.display = 'block';
            statusAlert.innerText = "No concert items found matching that query.";
            return;
        } else {
            statusAlert.style.display = 'none';
        }

        itemsList.forEach(item => {
            const cardNode = document.createElement('div');
            cardNode.className = 'concert-card';

            let year = '2026';
            let monthDayStr = item.Date;
            if (item.Date.includes('-')) {
                const parts = item.Date.split('-');
                year = parts[0];
                monthDayStr = (parts[1] && parts[2]) ? `${parts[1]}/${parts[2]}` : item.Date;
            }
            
            const timeDisplay = item.Time || 'TBA';
            const descriptionContent = `Concert features a performance of <strong>"${item.Title}"</strong> arranged ${item.Instrumentation || ''}. Brought to stage by ${item.Performer || 'various artists'} at ${item.Venue || 'the designated venue'}. ${item['Occasion/Presenter'] ? 'Presented on the occasion of: ' + item['Occasion/Presenter'] + '.' : ''}`;

            let badgesArr = [];
            if (item['Premiere/Performance']) badgesArr.push({ text: item['Premiere/Performance'], type: 'yellow' });
            if (item.Instrumentation) badgesArr.push({ text: item.Instrumentation.replace(/^for\s+/i, ''), type: 'yellow' });
            if (item.Cantonese === 'Y' || item.Cantonese === 'Yes') badgesArr.push({ text: 'Cantonese Repertoire', type: 'gray' });

            const tagsHTML = badgesArr.map(badge => {
                const modifierClass = badge.type === "gray" ? "gray-badge" : "yellow-badge";
                return `<span class="tag ${modifierClass}">${badge.text}</span>`;
            }).join('');

            const venueElement = item.Link 
                ? `<a href="${item.Link}" target="_blank">${item.Venue || 'View Event Link'}</a>`
                : (item.Venue || 'TBA');

            cardNode.innerHTML = `
                <div class="card-left-date">
                    <span class="date-year">${year}</span>
                    <span class="date-day">${monthDayStr}</span>
                    <span class="date-time">${timeDisplay}</span>
                </div>
                <div class="card-right-content">
                    <h2 class="concert-title">${item.Title}</h2>
                    <div class="concert-meta">
                        <span class="meta-node location">${item.City || 'Osaka'}${item.Country ? ', ' + item.Country : ''}</span>
                        <span class="meta-node hall">${venueElement}</span>
                    </div>
                    <div class="concert-desc">${descriptionContent}</div>
                    <div class="concert-tags">${tagsHTML}</div>
                </div>
            `;
            listContainer.appendChild(cardNode);
        });
    }

    // Filter Logic
    document.getElementById('concertSearch').addEventListener('input', function(event) {
        const filterToken = event.target.value.toLowerCase().trim();
        const matchingConcerts = globalConcertsDataset.filter(concert => {
            return (
                (concert.Title && concert.Title.toLowerCase().includes(filterToken)) ||
                (concert.Venue && concert.Venue.toLowerCase().includes(filterToken)) ||
                (concert.Performer && concert.Performer.toLowerCase().includes(filterToken)) ||
                (concert.Instrumentation && concert.Instrumentation.toLowerCase().includes(filterToken)) ||
                (concert.City && concert.City.toLowerCase().includes(filterToken))
            );
        });
        displayConcerts(matchingConcerts);
    });

    // Start Live Sync Process on DOM Load
    window.addEventListener('DOMContentLoaded', initLiveFetch);
</script>

</body>
</html>
