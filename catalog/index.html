<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳啟揚 Kai-Young Chan | 合唱作品目錄 Choral Catalogue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        body {
            font-family: "Times New Roman", "Songti TC", "Noto Serif TC", serif;
        }
        .font-inter {
            font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
        }
        .data-label {
            color: #4A2E80;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-[#FAF9F6] text-slate-900 selection:bg-[#D4AF37] selection:text-white">

    <div class="h-2 bg-gradient-to-r from-[#B3923E] via-[#D4AF37] to-[#F3E5AB]"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        
        <div class="flex flex-col md:flex-row md:items-end md:justify-between border-b border-[#D4AF37]/30 pb-8 mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-bold text-[#4A2E80] tracking-wide">陳啟揚 Kai-Young Chan</h1>
                <p class="text-2xl font-semibold text-[#B3923E] mt-1 tracking-[0.25em] font-inter uppercase">合唱作品目錄 • Choral Catalogue</p>
            </div>
            <div class="bg-white px-5 py-3 rounded-xl border border-slate-200 shadow-xs flex items-center gap-3 w-fit font-inter">
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Total Entries / 總數</span>
                <span id="recordCount" class="text-2xl font-bold text-[#4A2E80]">0</span>
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-200/60 mb-8 flex flex-col md:flex-row gap-4 items-end">
            <div class="w-full md:flex-1 font-inter">
                <label class="block text-xs font-bold text-[#4A2E80] uppercase tracking-wider mb-2">Search Catalog / 搜尋目錄</label>
                <input type="text" id="searchInput" placeholder="Search title, year, voice type..." 
                    class="w-full px-4 py-3 bg-[#FAF9F6] border border-slate-200 rounded-xl focus:outline-hidden focus:ring-2 focus:ring-[#4A2E80] focus:border-[#4A2E80] transition-all text-sm">
            </div>
            
            <div class="w-full md:w-72 relative font-inter">
                <span class="block text-xs font-bold text-[#4A2E80] uppercase tracking-wider mb-2">Sort & Filter</span>
                <button id="dropdownBtn" class="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium text-left flex justify-between items-center">
                    <span id="dropdownCurrentLabel">最新加入 Latest Entry</span>
                    <svg id="dropdownArrow" class="h-4 w-4 text-slate-500 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                
                <div id="dropdownMenu" class="hidden absolute left-0 mt-2 w-full bg-white border border-slate-200 rounded-xl shadow-lg z-30 py-2">
                    <label class="flex items-center px-4 py-2.5 hover:bg-slate-50 cursor-pointer text-sm font-medium text-slate-700">
                        <input type="radio" name="sortOption" value="latest_entry" checked class="accent-[#4A2E80] mr-3 h-4 w-4">
                        <span>最新加入 Latest Entry</span>
                    </label>
                    <label class="flex items-center px-4 py-2.5 hover:bg-slate-50 cursor-pointer text-sm font-medium text-slate-700">
                        <input type="radio" name="sortOption" value="year_latest" class="accent-[#4A2E80] mr-3 h-4 w-4">
                        <span>年份最近 Year: Latest</span>
                    </label>
                    <label class="flex items-center px-4 py-2.5 hover:bg-slate-50 cursor-pointer text-sm font-medium text-slate-700">
                        <input type="radio" name="sortOption" value="year_oldest" class="accent-[#4A2E80] mr-3 h-4 w-4">
                        <span>年份最遠 Year: Earliest</span>
                    </label>
                    <div class="border-t border-slate-100 my-1"></div>
                    <label class="flex items-center px-4 py-2.5 hover:bg-slate-50 cursor-pointer text-sm font-semibold text-[#4A2E80]">
                        <input type="checkbox" id="audioFilterCheckbox" class="accent-[#4A2E80] mr-3 h-4 w-4 rounded-xs">
                        <span>有錄音 Audio Available</span>
                    </label>
                </div>
            </div>

            <button id="resetFilters" class="w-full md:w-auto px-5 py-3 bg-slate-100 hover:bg-slate-200 text-sm font-semibold text-slate-600 rounded-xl cursor-pointer whitespace-nowrap font-inter">
                Reset / 重設
            </button>
        </div>

        <div id="loading" class="flex flex-col justify-center items-center py-24 font-inter">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-200 border-t-[#4A2E80]"></div>
            <span class="mt-4 text-sm font-semibold text-slate-500">Loading from Google Sheet...</span>
        </div>

        <div id="gridContainer" class="hidden">
            <div id="cardsLayout" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            <div id="noResults" class="hidden text-center py-20 bg-white border border-dashed border-slate-200 rounded-2xl font-inter">
                <h3 class="mt-4 text-sm font-bold text-slate-900">No matching works found</h3>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="detailsModal" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden shadow-2xl" id="modalBox"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/1gUY4w6OIb9_mbQ0M1GmXP_Lp27oO-ThcKqKiI5sWJJ0/gviz/tq?tqx=out:csv&gid=0';

        let globalData = [];

        const loadingEl = document.getElementById('loading');
        const gridContainerEl = document.getElementById('gridContainer');
        const cardsLayoutEl = document.getElementById('cardsLayout');
        const recordCountEl = document.getElementById('recordCount');
        const searchInput = document.getElementById('searchInput');
        const noResultsEl = document.getElementById('noResults');
        const modalEl = document.getElementById('detailsModal');
        const modalBox = document.getElementById('modalBox');

        function init() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    globalData = results.data
                        .filter(row => row['曲名'] || row['Title'])
                        .map((row, i) => ({ ...row, __index: i }));
                    
                    loadingEl.classList.add('hidden');
                    gridContainerEl.classList.remove('hidden');
                    setupListeners();
                    processDashboardEngine();
                }
            });
        }

        function setupListeners() {
            document.getElementById('dropdownBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                document.getElementById('dropdownMenu').classList.toggle('hidden');
                document.getElementById('dropdownArrow').classList.toggle('rotate-180');
            });

            document.addEventListener('click', () => {
                document.getElementById('dropdownMenu').classList.add('hidden');
                document.getElementById('dropdownArrow').classList.remove('rotate-180');
            });

            document.querySelectorAll('input[name="sortOption"]').forEach(radio => {
                radio.addEventListener('change', processDashboardEngine);
            });

            document.getElementById('audioFilterCheckbox').addEventListener('change', processDashboardEngine);
            searchInput.addEventListener('input', processDashboardEngine);
        }

        function processDashboardEngine() {
            const query = searchInput.value.toLowerCase().trim();
            const sortType = document.querySelector('input[name="sortOption"]:checked').value;
            const audioOnly = document.getElementById('audioFilterCheckbox').checked;

            let filtered = globalData.filter(row => {
                const match = Object.values(row).some(val => 
                    String(val || '').toLowerCase().includes(query)
                );
                if (!match) return false;
                if (audioOnly && !(row['錄音 Recording'] || '').trim()) return false;
                return true;
            });

            if (sortType === 'year_latest') {
                filtered.sort((a, b) => parseInt(b['年 Year'] || 0) - parseInt(a['年 Year'] || 0));
            } else if (sortType === 'year_oldest') {
                filtered.sort((a, b) => parseInt(a['年 Year'] || 0) - parseInt(b['年 Year'] || 0));
            } else {
                filtered.sort((a, b) => b.__index - a.__index);
            }

            renderCards(filtered);
        }

        function renderCards(data) {
            cardsLayoutEl.innerHTML = '';
            recordCountEl.textContent = data.length;

            if (data.length === 0) {
                noResultsEl.classList.remove('hidden');
                return;
            }
            noResultsEl.classList.add('hidden');

            data.forEach(row => {
                const titleC = (row['曲名'] || '').trim();
                const titleE = (row['Title'] || '').trim();
                const year = (row['年 Year'] || '').trim();
                const voice = (row['聲部 Voice Type'] || '').trim();
                const instrument = (row['樂器Instrument'] || '').trim();
                const duration = (row['Duration'] || '').trim();
                const recording = (row['錄音 Recording'] || '').trim();

                const hasRecording = recording.length > 0;

                const cardHTML = `
                    <div onclick="openModal(${row.__index})" class="bg-white rounded-2xl p-6 shadow-xs hover:shadow-md hover:-translate-y-1 transition-all cursor-pointer relative group">
                        ${hasRecording ? `
                            <span class="absolute top-4 right-4 bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2.5 py-1 rounded-full flex items-center gap-1">
                                <span class="relative flex h-2 w-2">
                                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                </span>
                                試聽 Listen
                            </span>` : ''}
                        
                        <div class="mb-5">
                            <h3 class="text-2xl font-bold text-[#4A2E80] leading-tight">${titleC || 'Untitled'}</h3>
                            ${titleE ? `<p class="text-[#B3923E] text-lg mt-1">${titleE}</p>` : ''}
                        </div>

                        <div class="space-y-3 text-sm">
                            ${year ? `<div><span class="data-label">YEAR:</span> <span class="font-medium">${year}</span></div>` : ''}
                            ${voice ? `<div><span class="data-label">VOICE TYPE:</span> <span class="font-medium">${voice}</span></div>` : ''}
                            ${instrument ? `<div><span class="data-label">INSTRUMENT:</span> <span class="font-medium">${instrument}</span></div>` : ''}
                            ${duration ? `<div><span class="data-label">DURATION:</span> <span class="font-medium">${duration}</span></div>` : ''}
                        </div>
                    </div>
                `;
                cardsLayoutEl.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        window.openModal = function(index) {
            const row = globalData.find(r => r.__index === index);
            if (!row) return;

            let content = `
                <div class="p-8 border-b border-slate-100 flex justify-between items-start sticky top-0 bg-white z-10">
                    <div>
                        <h2 class="text-3xl font-bold text-[#4A2E80]">${row['曲名'] || ''}</h2>
                        ${row['Title'] ? `<p class="text-2xl text-[#B3923E] mt-1">${row['Title']}</p>` : ''}
                    </div>
                    <button onclick="closeModal()" class="text-3xl text-slate-300 hover:text-slate-500">×</button>
                </div>
                <div class="p-8 space-y-6 overflow-auto max-h-[65vh]">
            `;

            // Main fields like in screenshot
            const mainFields = [
                ['YEAR', row['年 Year']],
                ['VOICE TYPE', row['聲部 Voice Type']],
                ['INSTRUMENT', row['樂器Instrument']],
                ['DURATION', row['Duration']],
                ['TEXT BY', row['文本作者 Text by']],
                ['LEVEL', row['程度Level']],
                ['PREMIERE', row['首演日 Premiere']]
            ];

            mainFields.forEach(([label, value]) => {
                if (value) {
                    content += `
                        <div class="flex border-b border-slate-100 pb-3 last:border-0">
                            <span class="data-label w-40 flex-shrink-0">${label}:</span>
                            <span class="font-medium">${value}</span>
                        </div>
                    `;
                }
            });

            if (row['附註 Notes']) {
                content += `
                    <div>
                        <span class="data-label">NOTES:</span>
                        <p class="mt-2 text-slate-700">${row['附註 Notes']}</p>
                    </div>
                `;
            }

            // Embedded Video
            const recording = row['錄音 Recording'] || '';
            if (recording) {
                const match = recording.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);
                if (match && match[1]) {
                    content += `
                        <div class="pt-6 border-t border-slate-200">
                            <span class="data-label block mb-3">RECORDING / 錄音</span>
                            <div class="aspect-video rounded-2xl overflow-hidden shadow-inner border border-slate-200">
                                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${match[1]}" 
                                    frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                            </div>
                        </div>
                    `;
                }
            }

            content += `</div>`;
            modalBox.innerHTML = content;
            modalEl.classList.remove('hidden');
        };

        window.closeModal = function() {
            modalEl.classList.add('hidden');
        };

        document.getElementById('resetFilters').addEventListener('click', () => {
            searchInput.value = '';
            document.querySelector('input[value="latest_entry"]').checked = true;
            document.getElementById('audioFilterCheckbox').checked = false;
            processDashboardEngine();
        });

        init();
    </script>
</body>
</html>
