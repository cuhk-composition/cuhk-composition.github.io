<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳啟揚合唱作品 | Choral Works by Kai-Young Chan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: "Times New Roman", "Songti TC", serif; }
        .font-inter { font-family: 'Inter', sans-serif !important; }
    </style>
</head>
<body class="bg-[#FAF9F6] text-slate-900">

    <div class="h-2 bg-gradient-to-r from-[#B3923E] via-[#D4AF37] to-[#F3E5AB]"></div>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="border-b border-[#D4AF37]/30 pb-8 mb-8">
            <h1 class="text-4xl font-bold text-[#4A2E80]">陳啟揚合唱作品</h1>
            <p class="text-2xl font-semibold text-[#B3923E] mt-1 font-inter uppercase tracking-[0.2em]">Choral Works by Kai-Young Chan</p>
        </div>

        <div id="cardsLayout" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <div id="detailsModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div id="modalBox" class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-8 shadow-2xl"></div>
    </div>

    <script>
        const sheetId = '1gUY4w6OIb9_mbQ0M1GmXP_Lp27oO-ThcKqKiI5sWJJ0';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

        let globalData = [];

        function init() {
            // PapaParse automatically treats row 2 as headers if using {header: true}
            Papa.parse(csvUrl, {
                download: true, 
                header: true, 
                skipEmptyLines: true,
                complete: (results) => {
                    globalData = results.data;
                    renderCards(globalData);
                }
            });
        }

        function renderCards(data) {
            const container = document.getElementById('cardsLayout');
            container.innerHTML = data.map((row, index) => `
                <div onclick="openModal(${index})" class="bg-white border border-slate-200 p-6 rounded-2xl cursor-pointer hover:bg-[#F3E5AB]/40 transition-all shadow-sm">
                    <h3 class="text-lg font-bold text-[#4A2E80] mb-2">${row['曲名'] || 'Untitled'}</h3>
                    <p class="text-xs text-slate-500 font-inter uppercase tracking-wider">${row['年 Year'] || ''}</p>
                    <p class="text-sm text-slate-700 mt-2">${row['聲部 Voice Type'] || ''}</p>
                </div>
            `).join('');
        }

        function openModal(index) {
            const row = globalData[index];
            const modalBox = document.getElementById('modalBox');
            const videoId = extractYouTubeID(row['錄音 Recording']);
            
            modalBox.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <h2 class="text-2xl font-bold text-[#4A2E80]">${row['曲名']} (${row['Title']})</h2>
                    <button onclick="document.getElementById('detailsModal').classList.add('hidden')" class="text-slate-400">✕</button>
                </div>
                <div class="space-y-3 font-inter text-sm">
                    <p><strong>Year:</strong> ${row['年 Year']}</p>
                    <p><strong>Voice Type:</strong> ${row['聲部 Voice Type']}</p>
                    <p><strong>Instrument:</strong> ${row['樂器Instrument']}</p>
                    <p><strong>Duration:</strong> ${row['Duration']}</p>
                    <p><strong>Text by:</strong> ${row['文本作者 Text by']}</p>
                    <p><strong>Level:</strong> ${row['程度Level']}</p>
                    ${videoId ? `<div class="aspect-video mt-4 rounded-xl overflow-hidden"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe></div>` : ''}
                </div>
            `;
            document.getElementById('detailsModal').classList.remove('hidden');
        }

        function extractYouTubeID(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        init();
    </script>
</body>
</html>
