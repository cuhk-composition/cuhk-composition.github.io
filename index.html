<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Data Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Data Directory</h1>
            <p class="mt-2 text-sm text-gray-600">Dynamically synced with your live Google Sheet.</p>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 mb-6 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="w-full sm:w-72 relative">
                <input type="text" id="searchInput" placeholder="Search anything..." 
                    class="w-full pl-4 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
            </div>
            
            <div class="w-full sm:w-58 flex items-center gap-2">
                <label for="filterDropdown" id="filterLabel" class="text-xs font-medium text-gray-500 whitespace-nowrap">Filter By:</label>
                <select id="filterDropdown" class="w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-blue-500">
                    <option value="">All Categories</option>
                </select>
            </div>
        </div>

        <div id="loading" class="flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
            <span class="ml-3 text-gray-600 font-medium">Loading live data...</span>
        </div>

        <div id="error" class="hidden bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg mb-6">
            <p class="font-medium">Failed to load data.</p>
            <p class="text-xs mt-1 text-red-600">Please make sure the Google Sheet's Share settings are set to <strong>"Anyone with the link can view"</strong>.</p>
        </div>

        <div id="tableContainer" class="hidden bg-white shadow-xs border border-gray-200 rounded-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
                    <thead id="tableHeader" class="bg-gray-50 text-xs font-semibold text-gray-600 uppercase tracking-wider">
                        </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-200 bg-white">
                        </tbody>
                </table>
            </div>
            <div id="noResults" class="hidden text-center py-12 text-gray-500">
                No matching records found.
            </div>
        </div>
    </div>

    <script>
        // Updated with your explicit Sheet ID
        const sheetId = '1ClxNbtnTS94u7WqscJZcY3d5MaBYyJZTwvI5eWrtWZ8';
        const jsonUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        let globalData = [];
        let headers = [];

        // DOM elements
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const tableContainerEl = document.getElementById('tableContainer');
        const tableHeaderEl = document.getElementById('tableHeader');
        const tableBodyEl = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const filterDropdown = document.getElementById('filterDropdown');
        const filterLabel = document.getElementById('filterLabel');
        const noResultsEl = document.getElementById('noResults');

        async function init() {
            try {
                const response = await fetch(jsonUrl);
                if (!response.ok) throw new Error('Network issue');
                
                const text = await response.text();
                
                // Parse out Google's structural response wrapper safely
                const jsonStart = text.indexOf('{');
                const jsonEnd = text.lastIndexOf('}') + 1;
                const jsonString = text.slice(jsonStart, jsonEnd);
                const dataObj = JSON.parse(jsonString);

                // Map column headers (fall back to letters if headers are unnamed)
                headers = dataObj.table.cols.map((col, index) => col.label || `Column ${index + 1}`);

                // Map data rows cleanly matching header indexes
                globalData = dataObj.table.rows.map(row => {
                    let rowData = {};
                    headers.forEach((header, index) => {
                        const cell = row.c[index];
                        // Extract formatted string value if available, otherwise raw value, else empty string
                        rowData[header] = cell ? (cell.f ? cell.f : (cell.v ?? '')) : '';
                    });
                    return rowData;
                });

                if (headers.length > 0) {
                    setupFilterDropdown();
                    renderTableHeader();
                    renderTableData(globalData);
                    
                    loadingEl.classList.add('hidden');
                    tableContainerEl.classList.remove('hidden');
                } else {
                    showError();
                }

            } catch (err) {
                console.error("Error fetching sheet data:", err);
                showError();
            }
        }

        function showError() {
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
        }

        // Sets up the dropdown filter utilizing unique values from the 1st Column
        function setupFilterDropdown() {
            const firstColumnHeader = headers[0];
            filterLabel.textContent = `${firstColumnHeader}:`;
            
            const uniqueValues = [...new Set(globalData.map(item => String(item[firstColumnHeader])))]
                                    .filter(val => val && val.trim() !== "");

            uniqueValues.sort().forEach(value => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = value;
                filterDropdown.appendChild(option);
            });
        }

        function renderTableHeader() {
            let html = '<tr>';
            headers.forEach(header => {
                html += `<th scope="col" class="px-6 py-4 font-semibold text-gray-700">${header}</th>`;
            });
            html += '</tr>';
            tableHeaderEl.innerHTML = html;
        }

        function renderTableData(data) {
            tableBodyEl.innerHTML = '';
            
            if (data.length === 0) {
                noResultsEl.classList.remove('hidden');
                return;
            }
            noResultsEl.classList.add('hidden');

            data.forEach(row => {
                let htmlRow = '<tr class="hover:bg-gray-50 transition-colors border-b border-gray-100">';
                headers.forEach(header => {
                    const cellValue = row[header] || '';
                    htmlRow += `<td class="px-6 py-4 text-gray-600">${cellValue}</td>`;
                });
                htmlRow += '</tr>';
                tableBodyEl.insertAdjacentHTML('beforeend', htmlRow);
            });
        }

        function filterAndSearchData() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedCategory = filterDropdown.value;
            const firstColumnHeader = headers[0];

            const filteredData = globalData.filter(row => {
                // Dropdown match
                const matchesCategory = selectedCategory === "" || String(row[firstColumnHeader]) === selectedCategory;

                // Keyword match (across all text fields)
                const matchesSearch = headers.some(header => {
                    const val = String(row[header] || '').toLowerCase();
                    return val.includes(searchTerm);
                });

                return matchesCategory && matchesSearch;
            });

            renderTableData(filteredData);
        }

        searchInput.addEventListener('input', filterAndSearchData);
        filterDropdown.addEventListener('change', filterAndSearchData);

        init();
    </script>
</body>
</html>
