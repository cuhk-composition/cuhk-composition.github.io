<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantonese Art Song Database | 粵語藝術歌曲庫</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Base Serif typography */
        body {
            font-family: "Times New Roman", "Songti TC", "Noto Serif TC", "Playfair Display", serif;
        }
        /* Sans-serif for data/tables */
        .data-sans {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-[#FAF9F6] text-slate-900 selection:bg-[#D4AF37] selection:text-white relative">

    <div class="h-2 bg-gradient-to-r from-[#B3923E] via-[#D4AF37] to-[#F3E5AB]"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        
        <div class="flex flex-col md:flex-row md:items-end md:justify-between border-b border-[#D4AF37]/30 pb-8 mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-bold text-[#4A2E80] tracking-wide">粵語藝術歌曲庫</h1>
                <p class="text-2xl font-semibold text-[#B3923E] mt-1 tracking-widest font-sans uppercase">CANTONESE ART SONG DATABASE</p>
                <p class="mt-3 text-xs text-slate-400 flex items-center gap-2">
                    <span class="inline-flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    A resource from <a href="https://cantonesecomposition.com" target="_blank" rel="noopener noreferrer" class="hover:text-[#B3923E] underline decoration-slate-300 hover:decoration-[#B3923E] transition-colors">Cantonese Contemporary Music Research</a>
                </p>
            </div>
            <div class="bg-white px-5 py-3 rounded-xl border border-slate-200 shadow-xs flex items-center gap-3 w-fit">
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Total Entries / 總數</span>
                <span id="recordCount" class="text-2xl font-bold text-[#4A2E80]">0</span>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-200/60 mb-8 flex flex-col md:flex-row gap-4 items-end">
            <div class="w-full md:flex-1">
                <label for="searchInput" class="block text-xs font-bold text-[#4A2E80] uppercase tracking-wider mb-2">Search Catalog / 搜尋目錄</label>
                <input type="text" id="searchInput" placeholder="Search title, composer, instrumentation, text type..." 
                    class="w-full px-4 py-3 bg-[#FAF9F6] border border-slate-200 rounded-xl focus:outline-hidden focus:ring-2 focus:ring-[#4A2E80] focus:border-[#4A2E80] transition-all text-sm font-medium">
            </div>
            
            <div class="w-full md:w-72">
                <label for="sortDropdown" class="block text-xs font-bold text-[#4A2E80] uppercase tracking-wider mb-2">Sort By / 排序方式</label>
                <select id="sortDropdown" class="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-hidden focus:ring-2 focus:ring-[#4A2E80] cursor-pointer">
                    <option value="latest_entry">最新加入 Latest Entry First</option>
                    <option value="earliest_entry">最先加入 Earliest Entry First</option>
                    <option value="year_latest">年份最近 Year: Latest First</option>
                    <option value="year_oldest">年份最遠 Year: Oldest First</option>
                </select>
            </div>

            <button id="resetFilters" class="w-full md:w-auto px-5 py-3 bg-slate-100 hover:bg-slate-200 active:scale-98 transition-all text-sm font-semibold text-slate-600 rounded-xl cursor-pointer whitespace-nowrap">
                Reset / 重設
            </button>
        </div>

        <div id="gridContainer" class="hidden">
            <div id="cardsLayout" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <div id="detailsModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[85vh] overflow-y-auto shadow-2xl border border-slate-200 flex flex-col transform transition-transform duration-300 scale-95" id="modalBox">
        </div>
    </div>

    <script>
        const sheetId = '1ClxNbtnTS94u7WqscJZcY3d5MaBYyJZTwvI5eWrtWZ8';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

        let globalData = [];
        let headers = [];

        const cardsLayoutEl = document.getElementById('cardsLayout');
        const modalEl = document.getElementById('detailsModal');
        const modalBox = document.getElementById('modalBox');

        function init() {
            Papa.parse(csvUrl, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    headers = results.meta.fields;
                    globalData = results.data.map((row, index) => ({ ...row, __naturalIndex: index }));
                    renderCatalogCards(globalData);
                }
            });
        }

        function renderCatalogCards(data) {
            cardsLayoutEl.innerHTML = '';
            data.forEach(row => {
                const titleC = (row['Title (C)'] || '').trim();
                const titleE = (row['Title (E)'] || '').trim();
                const comp = (row['Composer (C)'] || '') + ' ' + (row['Composer (E)'] || '');
                const lyrics = (row['Text (C)'] || '') + ' ' + (row['Text (E)'] || '');
                const year = (row['Year'] || '').trim();
                
                let rowsArray = [];
                if (year) rowsArray.push(['Year', year]);
                if (comp) rowsArray.push(['Composer', comp]);
                if (lyrics) rowsArray.push(['Lyrics', lyrics]);

                let tableRowsHtml = '';
                rowsArray.forEach(([label, val]) => {
                    tableRowsHtml += `<tr class="border-b border-slate-100 last:border-0"><td class="py-2 pr-4 font-bold text-[#4A2E80] text-xs uppercase tracking-wider w-1/3 align-top data-sans">${label}:</td><td class="py-2 text-slate-700 font-medium text-sm align-top data-sans">${val}</td></tr>`;
                });

                cardsLayoutEl.insertAdjacentHTML('beforeend', `
                    <div onclick="openModal(${row.__naturalIndex})" class="bg-white border border-slate-200 rounded-2xl p-6 shadow-xs cursor-pointer hover:shadow-md hover:border-[#B3923E] hover:-translate-y-1 hover:bg-[#4A2E80]/5 transition-all">
                        <div class="mb-4">
                            ${titleC ? `<h3 class="text-xl font-bold text-[#4A2E80]">${titleC}</h3>` : ''}
                            ${titleE ? `<p class="text-md font-medium text-[#B3923E] mt-0.5">${titleE}</p>` : ''}
                        </div>
                        <table class="w-full border-collapse mt-2"><tbody>${tableRowsHtml}</tbody></table>
                    </div>
                `);
            });
        }

        function openModal(naturalIndex) {
            const row = globalData.find(item => item.__naturalIndex === naturalIndex);
            const textType = row['Text-type'];
            const textFirst = row['Text-first'];
            
            // Generate Tags
            let tagsHtml = '';
            if (textType || textFirst) {
                tagsHtml = `
                    <div class="mt-4 flex flex-wrap gap-2 data-sans">
                        ${textType ? `<span class="px-2 py-1 bg-[#4A2E80]/10 text-[#4A2E80] text-[10px] font-bold uppercase rounded-md tracking-wider">${textType}</span>` : ''}
                        ${textFirst ? `<span class="px-2 py-1 bg-[#B3923E]/10 text-[#B3923E] text-[10px] font-bold uppercase rounded-md tracking-wider">${textFirst}</span>` : ''}
                    </div>
                `;
            }

            modalBox.innerHTML = `
                <div class="p-6 border-b border-slate-100">
                    <h2 class="text-2xl font-bold text-[#4A2E80] leading-snug">${row['Title (C)']}</h2>
                    <p class="text-lg font-medium text-[#B3923E]">${row['Title (E)']}</p>
                    ${tagsHtml}
                </div>
                <div class="p-6">
                    <table class="w-full border-collapse data-sans">
                        ${Object.keys(row).map(key => key !== '__naturalIndex' && row[key] ? `<tr class="border-b"><td class="py-2 text-xs font-bold text-[#4A2E80] uppercase">${key}</td><td class="py-2 text-sm">${row[key]}</td></tr>` : '').join('')}
                    </table>
                </div>
            `;
            modalEl.classList.remove('hidden');
        }

        function closeModal() { modalEl.classList.add('hidden'); }
        modalEl.addEventListener('click', (e) => { if (e.target === modalEl) closeModal(); });
        init();
    </script>
</body>
</html>
