<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Gwilt Composition Prize • Voting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="max-w-2xl mx-auto py-12 px-6">
    <h1 class="text-4xl font-bold text-amber-400 text-center mb-2">David Gwilt Composition Prize</h1>
    <p class="text-center text-zinc-400 mb-10">2026 Composers' Concert Voting Form</p>

    <div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
      <form id="votingForm" class="space-y-10">
        <div>
          <h2 class="text-xl font-semibold text-amber-300 mb-4">1. Voter Information</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <input type="text" id="voterName" placeholder="Full Name" required
                   class="bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 w-full">
            <select id="role" required class="bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 w-full">
              <option value="">Select Role...</option>
              <option value="Ensemble Member">Ensemble Member</option>
              <option value="Faculty Member">Faculty Member</option>
            </select>
          </div>
        </div>

        <div>
          <h2 class="text-xl font-semibold text-amber-300 mb-4">2. Top 3 Ranking</h2>
          <div class="space-y-6">
            <div>
              <label class="block text-amber-400 mb-1">1st Choice (5 pts)</label>
              <select id="rank1" required class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4"></select>
            </div>
            <div>
              <label class="block text-zinc-300 mb-1">2nd Choice (3 pts)</label>
              <select id="rank2" required class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4"></select>
            </div>
            <div>
              <label class="block text-zinc-300 mb-1">3rd Choice (1 pt)</label>
              <select id="rank3" required class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4"></select>
            </div>
          </div>
        </div>

        <div>
          <h2 class="text-xl font-semibold text-amber-300 mb-4">3. Comments (Optional)</h2>
          <textarea id="comments" rows="4" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4" placeholder="Brief feedback..."></textarea>
        </div>

        <button type="submit" id="submitBtn" 
                class="w-full bg-gradient-to-r from-amber-500 to-yellow-600 text-black font-bold py-5 rounded-3xl text-lg">
          Submit My Vote
        </button>
      </form>
    </div>
  </div>

  <script>
    const works = [
      "Cody Wong Lok Heng: Hectic",
      "Chan Lok Tim: Floating Voices",
      "Kasper Chan Chi Huen: Three Encounters with My Mother in the Dreams",
      "Jack Yau Chi Fung: Judgement Day",
      "Chiu Long Hei: Ashes",
      "Royce Lei Lok In: Aqua Fantasy",
      "Daniel Lau Lik Chi: Ascending the Plateau of Joy",
      "Antal Lau Yan Ho: Six Seven"
    ];

    function populateDropdowns() {
      ['rank1', 'rank2', 'rank3'].forEach(id => {
        const sel = document.getElementById(id);
        sel.innerHTML = '<option value="">— Select a work —</option>';
        works.forEach(work => {
          const opt = document.createElement('option');
          opt.value = work;
          opt.textContent = work;
          sel.appendChild(opt);
        });
      });
    }

    document.getElementById('votingForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = 'Submitting...';

      const data = {
        VoterName: document.getElementById('voterName').value.trim(),
        Role: document.getElementById('role').value,
        First: document.getElementById('rank1').value,
        Second: document.getElementById('rank2').value,
        Third: document.getElementById('rank3').value,
        Comments: document.getElementById('comments').value.trim()
      };

      try {
        await fetch('https://script.google.com/macros/s/AKfycbyEMBddmpz0Dm5onc69OIwCXj3wEbWL5VnAxa8dMrVV9v3x6Ec_sapf68nhIVsDLdH9mQ/exec', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        alert("✅ Thank you! Your vote has been successfully submitted.");
        this.reset();
      } catch (err) {
        alert("❌ Submission failed. Please check your internet connection and try again.");
      }

      btn.disabled = false;
      btn.innerHTML = 'Submit My Vote';
    });

    window.onload = populateDropdowns;
  </script>
</body>
</html>
